name: PaperPlaneRun
options:
  bundleIdPrefix: com.sappgulf
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    TARGETED_DEVICE_FAMILY: "1,2"
    DEVELOPMENT_TEAM: ""
targets:
  PaperPlaneRun:
    type: application
    platform: iOS
    sources:
      - path: PaperPlaneRun/Sources
      - path: PaperPlaneRun/Assets.xcassets
      - path: PaperPlaneRun/web
        type: folder
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sappgulf.paperplanerun
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_FILE: PaperPlaneRun/Info.plist
        GENERATE_INFOPLIST_FILE: NO
